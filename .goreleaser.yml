before:
  hooks:
    - go mod tidy

builds:
  - id: pim
    main: ./cmd/pim
    binary: pim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Ignore arm64 for Windows (not commonly used)
    ignore:
      - goos: windows
        goarch: arm64
    # Sign macOS binaries after build
    hooks:
      post:
        - cmd: |
            if [ "{{ .Os }}" = "darwin" ] && [ -n "$DEVELOPER_ID" ]; then
              codesign --force --sign "$DEVELOPER_ID" --timestamp "{{ .Path }}"
              codesign --verify --verbose "{{ .Path }}"
              echo "Signed {{ .Path }}"
            fi
          env:
            - DEVELOPER_ID={{ .Env.DEVELOPER_ID }}

archives:
  - id: pim
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: anasmohana
    name: pim
  draft: false
  prerelease: auto
