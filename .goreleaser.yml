before:
  hooks:
    - go mod tidy

builds:
  - id: pim-linux
    main: ./cmd/pim
    binary: pim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

  - id: pim-windows
    main: ./cmd/pim
    binary: pim
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64

  - id: pim-darwin
    main: ./cmd/pim
    binary: pim
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # Sign macOS binaries after build
    hooks:
      post:
        - codesign --force --sign "{{ .Env.DEVELOPER_ID }}" --timestamp "{{ .Path }}"
        - codesign --verify --verbose "{{ .Path }}"

archives:
  - id: pim
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: anasmohana
    name: pim
  draft: false
  prerelease: auto
